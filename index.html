<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Best Friend Test 😂</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Background -->

    <div class="background">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- Main Card -->

    <div class="container">

        <div class="card">

            <div class="progress">

                <div class="progress-fill"></div>

            </div>

            <h3 class="question-count">
                Question 1 / 5
            </h3>

            <h1 class="title">
                😂 Best Friend Reality Check
            </h1>

            <p class="subtitle">

                Warning ⚠️

                Is page ko beech me band kiya...

                To dosti officially cancel. 😌

            </p>

            <button class="start-btn">
                Start Challenge 🚀
            </button>

        </div>

    </div>

    <!-- Quiz -->

    <div class="quiz hide">

        <div class="question-card">

            <h2 class="question">

                Sach sach bata...

                Main tere liye kya hu? 👀

            </h2>

            <div class="options">

                <button class="option">
                    ❤️ Bestie
                </button>

                <button class="option">
                    🤡 Timepass
                </button>

            </div>

            <div class="response">

                <h3>

                    Hmm...

                    Abhi ke liye maan leta hu 😌

                </h3>

            </div>

            <div class="image-box">

                <img src="assets/images/meme1.jpg">

            </div>

            <button class="next">

                Next Question ➜

            </button>

        </div>

    </div>

    <script src="js/questions.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/confetti.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
